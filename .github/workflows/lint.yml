name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Check style
        run: ruff check evalhub/scripts/
      - name: Check formatting
        run: ruff format --check evalhub/scripts/

  skills:
    name: Skills (skillsaw)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install skillsaw
        run: pip install skillsaw
      - name: Lint SKILL.md files
        run: |
          for d in evalhub evalhub-discovery evalhub-eval evalhub-jobs; do
            (cd "$d" && skillsaw lint SKILL.md)
          done
